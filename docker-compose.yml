version: "3.8"

services:
  weixin-local-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weixin-local-chat
    ports:
      - "3100:3100"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/api/system/health"]
      interval: 30s
      timeout: 10s
      start-period: 5s
      retries: 3
